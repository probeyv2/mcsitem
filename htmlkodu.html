<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunucu Web Sitesi | Turuncu Tema</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">
                <img src="logo.png" alt="Sunucu Logosu">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Anasayfa</a></li>

                    <li><a href="#">Sıralama</a></li>
                    <li><a href="#">Destek</a></li>
                </ul>

    <main class="hero">

            <p>Türkiye'nin en gelişmiş Minecraft sunucusuna sen de katıl!</p>
            <div class="buttons">
                <button class="btn join-btn" onclick="copyIP()">play.sunucuadi.com</button>
                <button class="btn store-btn">Mağazaya Git</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
